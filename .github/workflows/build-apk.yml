name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'native-companion/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools-version: '34.0.0'
          ndk-version: '26.1.10909125'

      - name: Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: '1.3.14'

      - name: Install dependencies
        working-directory: native-companion
        run: |
          npm install --legacy-peer-deps

      - name: Setup Expo
        working-directory: native-companion
        run: |
          npx expo install expo
          npx expo --version

      - name: Generate native Android project
        working-directory: native-companion
        run: |
          npx expo prebuild --platform android --clean --no-install

      - name: Generate keystore for signing
        working-directory: native-companion/android
        run: |
          keytool -genkeypair \
            -v \
            -storetype PKCS12 \
            -keystore aria-release.keystore \
            -alias aria-key \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass aria-console-2026 \
            -keypass aria-console-2026 \
            -dname "CN=Aria Console, OU=Mobile, O=Resolutefemi, L=Lagos, ST=Lagos, C=NG"

      - name: Configure Gradle for release signing
        working-directory: native-companion/android
        run: |
          cat >> app/build.gradle << 'GRADLE_EOF'

          // Release signing config
          android.signingConfigs {
            release {
              storeFile file('../../aria-release.keystore')
              storePassword 'aria-console-2026'
              keyAlias 'aria-key'
              keyPassword 'aria-console-2026'
            }
          }
          android.buildTypes.release.signingConfig = android.signingConfigs.release
          GRADLE_EOF

      - name: Build release APK
        working-directory: native-companion/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon -x lintVitalRelease

      - name: Rename APK
        working-directory: native-companion/android
        run: |
          APK_PATH="app/build/outputs/apk/release/app-release.apk"
          if [ -f "$APK_PATH" ]; then
            cp "$APK_PATH" "../../aria-companion.apk"
            ls -lh "../../aria-companion.apk"
          else
            echo "APK not found at $APK_PATH"
            find app/build/outputs -name "*.apk" -type f
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: aria-companion-apk
          path: aria-companion.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.${{ github.run_number }}
          name: Aria Companion v1.${{ github.run_number }}
          body: |
            # Aria Companion App

            ## Download
            Download `aria-companion.apk` below and install on your Android phone.

            ## Installation
            1. Download the APK file
            2. Open it on your Android phone
            3. Allow "Install from unknown sources" if prompted
            4. Install and open the app
            5. Enter the 6-digit pairing code from your Aria Console dashboard

            ## Build info
            - Build: #${{ github.run_number }}
            - Commit: ${{ github.sha }}
            - Date: ${{ github.run_started_at }}
          files: aria-companion.apk
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
